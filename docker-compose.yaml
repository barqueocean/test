services:
  nginx:
    image: nginx:alpine
    container_name: symfony-pet-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./:/app
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    build:
      context: ./php
    container_name: symfony-pet-php
    working_dir: /app
    volumes:
      - ./app:/app
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: symfony-pet-mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: symfony_pet
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    volumes:
      - symfony_pet_mysql:/var/lib/mysql

volumes:
  symfony_pet_mysql: